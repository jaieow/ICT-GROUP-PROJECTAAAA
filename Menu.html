<html>
<head>
<style>
body{
    margin:0;
    min-height:100vh;
}
.container{
    display:flex;
    gap:20px;
    justify-content:center;
    align-items:flex-start;
}
audio{
    position:fixed;
    bottom:20px;
    right:20px;
}
.header{
    display:flex;
    align-items:center;
    gap:10px;
}
.nav{
    display:flex;
    gap:15px;
    width:50%
}
.topsection{
    display:flex;
    gap:20px;
    align-items:flex-start;
}
.textbox{
    width:96%;
    padding:30px;
    background-color:rgba(139, 69, 19, 0.3);
    border-radius:20px;
    max-height:100vh;
    overflow-y:auto;
}

::-webkit-scrollbar-track{
    background: rgba(20,30,40,0.5);
    border-radius:10px;
}

::-webkit-scrollbar-thumb{
    background: rgba(180,220,255,0.6);
    border-radius:10px;
}

::-webkit-scrollbar-thumb:hover{
    background: rgba(220,240,255,0.8);
}
::-webkit-scrollbar{
    width:6px;
}
@font-face {
    font-family: 'Coolvetica';
    src: url('fonts/Coolvetica Rg.otf');
}

@font-face {
    font-family: 'Montserrat';
    src: url('fonts/montserrat.regular.ttf');
}
h1{
    font-family: 'Coolvetica';
    font-size:350%;
    color:white;
    text-shadow:2px 2px 5px black;
    margin-bottom:3px;
}

p{
    font-family: 'Montserrat';
    color:white;
    text-shadow:2px 2px 5px black;
    font-size:150%;
    margin-top:3px;
}
details{
    margin-top:10px;
    margin-bottom:10px;
    background-color:rgba(0,0,0,0.35);
    padding:10px;
    border-radius:10px;
    font-family:PerpetuaTitlingMTSd-Lt;
    color:white;
    text-shadow:2px 2px 5px black;
    font-size:100%
}
summary{
    cursor:pointer;
    font-size:20px;
    font-weight:bold;
    font-family: 'Montserrat';
    color:white;
    text-shadow:2px 2px 5px black;
    font-size:150%;
}
.header{
    display:flex;
    align-items:center;
    gap:10px;
}
.nav{
    display:flex;
    gap:15px;
    width:50%
}
.topsection{
    display:flex;
    gap:20px;
    align-items:flex-start;
}
.center-block {
  display: block;
  margin-left: auto;
  margin-right: auto;
}
.logo{
    position:absolute;
    top:20px;
    right:20px;
}
table {
  width: 100%;
  border-collapse: collapse;
}

th, td {
  border: 1px solid #ddd;
  padding: 8px;
  text-align: center;
    background-color:rgba(220, 20, 60, 0.2);
}
@media (max-width: 768px) {

    .header{
        flex-direction:column;
        text-align:center;
    }

    .textbox{
        width:90%;
        margin:auto;
    }

    p{
        font-size:120%;
    }

    img{
        max-width:100%;
        height:auto;
    }
}
</style>
<title>Menu</title>
</head>
<body bgcolor="#50C878">
<div class="textbox" style="position:relative;">
<img class="logo" src="Berry & Brew logo.png" style="float: right; margin-left: 15px;" height="100" width="100">
<h1 style="text-align:center">Berry & Brew</h1>
<p style="text-align:center">Sip with glee, taste the tea</p>
<p>(insert banner/hero idk)</p>
</div>
<br>

<div class="textbox">
<h1 style="text-align:center">(insert whatever)</h1>
<p style="text-align:center">(whatever)</p>
</div>
<br>
<div class="textbox">
<table>
<tr><th>Here's what you should expect the product would look like</th>

<td>IDK</td>

</div>
<audio controls autoplay loop preload="auto">

</div></div>
</body>
</html>
