<html>

<style>
body{
    margin:0;
    min-height:100vh;
}
.container{
    display:flex;
    gap:20px;
    justify-content:center;
    align-items:flex-start;
}
audio{
    position:fixed;
    bottom:20px;
    right:20px;
}
.header{
    display:flex;
    align-items:center;
    gap:10px;
}
.nav{
    display:flex;
    gap:15px;
    width:50%
}
.topsection{
    display:flex;
    gap:20px;
    align-items:flex-start;
}
.textbox{
    width:96%;
    padding:30px;
    background-color:rgba(139, 69, 19, 0.1);
    border-radius:20px;
    max-height:100vh;
    overflow-y:auto;
}

::-webkit-scrollbar-track{
    background: rgba(20,30,40,0.5);
    border-radius:10px;
}

::-webkit-scrollbar-thumb{
    background: rgba(180,220,255,0.6);
    border-radius:10px;
}

::-webkit-scrollbar-thumb:hover{
    background: rgba(220,240,255,0.8);
}
::-webkit-scrollbar{
    width:6px;
}
@font-face {
    font-family: 'Coolvetica';
    src: url('fonts/Coolvetica Rg.otf');
}

@font-face {
    font-family: 'Montserrat';

    font-family: 'Coolvetica';

summary{
    cursor:pointer;
    font-size:20px;
    font-weight:bold;
    font-family: 'Montserrat';
    color:white;
    text-shadow:2px 2px 5px black;
    font-size:150%;
}
.header{
    display:flex;
    align-items:center;
    gap:10px;
}
.nav{
    display:flex;
    gap:15px;
    width:50%
}
.topsection{
    display:flex;
    gap:20px;
    align-items:flex-start;
}
.center-block {
  display: block;
  margin-left: auto;
  margin-right: auto;
}
.logo{
    position:absolute;
    top:20px;
    right:20px;
}
table {
  width: 100%;
  border-collapse: collapse;
}

th, td {
  border: 1px solid #ddd;
  padding: 8px;
  text-align: center;
    background-color:rgba(220, 20, 60, 0.2);
}
@media (max-width: 768px) {

    .header{
        flex-direction:column;
        text-align:center;
    }

    .textbox{
        width:90%;
        margin:auto;
    }

    p{
        font-size:120%;
    }

    img{
        max-width:100%;
        height:auto;
    }
}
</style>
