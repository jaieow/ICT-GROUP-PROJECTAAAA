<html>
<head>
<style>
body{
    margin:0;
    min-height:100vh;
}
.container{
    display:flex;
    gap:20px;
    justify-content:center;
    align-items:flex-start;
}

.textbox{
    width:95%;
    padding:30px;
    background-color:rgba(139, 69, 19, 0.3);
    border-radius:20px;
    max-height:100vh;
    overflow-y:auto;
}

::-webkit-scrollbar-track{
    background: rgba(20,30,40,0.5);
    border-radius:10px;
}

::-webkit-scrollbar-thumb{
    background: rgba(180,220,255,0.6);
    border-radius:10px;
}

::-webkit-scrollbar-thumb:hover{
    background: rgba(220,240,255,0.8);
}
::-webkit-scrollbar{
    width:6px;
}
@font-face {
    font-family: 'Coolvetica';
    src: url('fonts/Coolvetica Rg.otf');
}

@font-face {
    font-family: 'Montserrat';
    src: url('fonts/montserrat.regular.ttf');
}
h1{
    font-family: 'Coolvetica';
    font-size:350%;
    color:white;
    text-shadow:2px 2px 5px black;
}

p{
    font-family: 'Montserrat';
    color:white;
    text-shadow:2px 2px 5px black;
    font-size:150%;
}
details{
    margin-top:10px;
    margin-bottom:10px;
    background-color:rgba(0,0,0,0.35);
    padding:10px;
    border-radius:10px;
    font-family:PerpetuaTitlingMTSd-Lt;
    color:white;
    text-shadow:2px 2px 5px black;
    font-size:100%
}
summary{
    cursor:pointer;
    font-size:20px;
    font-weight:bold;
    font-family:PerpetuaTitlingMTSd-Lt;
    color:white;
    text-shadow:2px 2px 5px black;
    font-size:125%
}
.header{
    display:flex;
    align-items:center;
    gap:10px;
}
.nav{
    display:flex;
    gap:15px;
    width:50%
}
.topsection{
    display:flex;
    gap:20px;
    align-items:flex-start;
}
.center-block {
  display: block;
  margin-left: auto;
  margin-right: auto;
}

@media (max-width: 768px) {

    .header{
        flex-direction:column;
        text-align:center;
    }

    .textbox{
        width:90%;
        margin:auto;
    }

    p{
        font-size:120%;
    }

    img{
        max-width:100%;
        height:auto;
    }
}
</style>
<title>Berry&Brew</title>
</head>
<body bgcolor="#50C878">
<div class="textbox">
<audio controls autoplay loop>
<source src="toby fox - UNDERTALE Soundtrack - 63 It's Raining Somewhere Else.mp3" type="audio/mpeg">
</audio>
<img src="Berry & Brew logo.png" style="float: right; margin-left: 15px;" height="100" width="100">
<h1 style="text-align:left">PLACEHOLDER</h1>
<p>placeholder</p>
</div>
<br>
<div class="textbox">
<div class="header">
<a href=""></a>
</div>
</div>
</body>
</html>
